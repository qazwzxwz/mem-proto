<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анимация — Burn Away</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: #1a1d20;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      width: 480px;
      max-width: calc(100% - 32px);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .layer {
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .problem {
      background: linear-gradient(135deg, #1a1d20, #2a1012);
      position: relative;
      z-index: 2;
    }

    .solution {
      background: linear-gradient(160deg, #f0f4f2 0%, #e8efe9 40%, #f5f8f5 100%);
      color: #1a1d20;
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
    }

    /* ── Burn effect: gradient mask erodes from bottom ── */
    .problem {
      -webkit-mask-image: linear-gradient(
        to top,
        black 0%, black 100%
      );
      mask-image: linear-gradient(
        to top,
        black 0%, black 100%
      );
      -webkit-mask-size: 100% 100%;
      mask-size: 100% 100%;
      transition: none;
    }

    .card.burning .problem {
      animation: burnMask 1.2s ease-in forwards;
    }

    @keyframes burnMask {
      0%   {
        -webkit-mask-image: linear-gradient(to top, black 0%, black 100%);
        mask-image: linear-gradient(to top, black 0%, black 100%);
      }
      30%  {
        -webkit-mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 15%, black 35%, black 100%);
        mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 15%, black 35%, black 100%);
      }
      60%  {
        -webkit-mask-image: linear-gradient(to top, transparent 0%, transparent 35%, rgba(0,0,0,0.2) 50%, black 70%, black 100%);
        mask-image: linear-gradient(to top, transparent 0%, transparent 35%, rgba(0,0,0,0.2) 50%, black 70%, black 100%);
      }
      85%  {
        -webkit-mask-image: linear-gradient(to top, transparent 0%, transparent 70%, rgba(0,0,0,0.15) 85%, black 95%);
        mask-image: linear-gradient(to top, transparent 0%, transparent 70%, rgba(0,0,0,0.15) 85%, black 95%);
      }
      100% {
        -webkit-mask-image: linear-gradient(to top, transparent 0%, transparent 100%);
        mask-image: linear-gradient(to top, transparent 0%, transparent 100%);
      }
    }

    /* ── Fire glow edge (follows the burn line) ── */
    .fire-edge {
      position: absolute;
      left: 0; right: 0;
      height: 60px;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(
        to top,
        transparent 0%,
        rgba(255, 80, 0, 0.5) 30%,
        rgba(255, 200, 50, 0.7) 50%,
        rgba(255, 80, 0, 0.4) 70%,
        transparent 100%
      );
      filter: blur(8px);
    }

    .card.burning .fire-edge {
      opacity: 1;
      animation: fireRise 1.2s ease-in forwards;
    }

    @keyframes fireRise {
      0%   { bottom: -10px; opacity: 0; }
      10%  { opacity: 1; }
      20%  { bottom: 5%; }
      50%  { bottom: 40%; }
      75%  { bottom: 70%; opacity: 0.8; }
      90%  { bottom: 90%; opacity: 0.4; }
      100% { bottom: 105%; opacity: 0; }
    }

    /* ── Ember particles ── */
    .embers {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }
    .ember {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #ff8c00;
      opacity: 0;
      box-shadow: 0 0 4px 1px rgba(255, 140, 0, 0.6);
    }

    .card.burning .ember { animation: emberFloat 1.4s ease-out forwards; }
    .card.burning .ember:nth-child(1)  { left: 15%; animation-delay: 0.1s; }
    .card.burning .ember:nth-child(2)  { left: 30%; animation-delay: 0.2s; }
    .card.burning .ember:nth-child(3)  { left: 45%; animation-delay: 0.15s; }
    .card.burning .ember:nth-child(4)  { left: 60%; animation-delay: 0.25s; }
    .card.burning .ember:nth-child(5)  { left: 75%; animation-delay: 0.3s; }
    .card.burning .ember:nth-child(6)  { left: 20%; animation-delay: 0.35s; }
    .card.burning .ember:nth-child(7)  { left: 50%; animation-delay: 0.4s; }
    .card.burning .ember:nth-child(8)  { left: 80%; animation-delay: 0.2s; }
    .card.burning .ember:nth-child(9)  { left: 35%; animation-delay: 0.45s; }
    .card.burning .ember:nth-child(10) { left: 65%; animation-delay: 0.5s; }
    .card.burning .ember:nth-child(11) { left: 10%; animation-delay: 0.55s; }
    .card.burning .ember:nth-child(12) { left: 88%; animation-delay: 0.3s; }

    @keyframes emberFloat {
      0%   { bottom: 10%; opacity: 0; transform: scale(1); }
      15%  { opacity: 1; }
      100% { bottom: 110%; opacity: 0; transform: scale(0.3) translateX(var(--drift, 20px)); }
    }
    .ember:nth-child(odd)  { --drift: -25px; }
    .ember:nth-child(even) { --drift: 18px; }
    .ember:nth-child(3n)   { --drift: -10px; width: 2px; height: 2px; }
    .ember:nth-child(4n)   { --drift: 30px; background: #ffcc00; }

    /* ── Solution fade-in after burn ── */
    .solution > * {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .card.solved .solution > *:nth-child(1) { opacity: 1; transform: none; transition-delay: 0.15s; }
    .card.solved .solution > *:nth-child(2) { opacity: 1; transform: none; transition-delay: 0.25s; }
    .card.solved .solution > *:nth-child(3) { opacity: 1; transform: none; transition-delay: 0.35s; }
    .card.solved .solution > *:nth-child(4) { opacity: 1; transform: none; transition-delay: 0.45s; }

    /* ── Reverse: solution fades, problem restores ── */
    .card.restoring .problem {
      animation: burnRestore 0.6s ease-out forwards;
    }
    @keyframes burnRestore {
      0%   {
        -webkit-mask-image: linear-gradient(to top, transparent 0%, transparent 100%);
        mask-image: linear-gradient(to top, transparent 0%, transparent 100%);
      }
      100% {
        -webkit-mask-image: linear-gradient(to top, black 0%, black 100%);
        mask-image: linear-gradient(to top, black 0%, black 100%);
      }
    }

    /* ── UI ── */
    .alert {
      font-size: 0.8rem; font-weight: 600; color: #E93C35;
      text-transform: uppercase; letter-spacing: 0.15em;
    }
    h2 { font-size: 1.5rem; line-height: 1.3; }
    h2 em { font-style: normal; color: #E93C35; }
    p { font-size: 0.88rem; color: rgba(255,255,255,0.6); line-height: 1.6; }
    .solution p { color: rgba(26,29,32,0.6); }
    .badge { font-size: 0.8rem; font-weight: 600; color: #2E7D32; }
    .solution h3 { font-size: 1.4rem; color: #1a1d20; }

    .btn {
      align-self: flex-start; padding: 12px 24px; border: none;
      border-radius: 12px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn--solve { background: rgba(233,60,53,0.15); color: #fff; border: 1px solid rgba(233,60,53,0.3); }
    .btn--back { background: rgba(46,125,50,0.1); color: #2E7D32; border: 1px solid rgba(46,125,50,0.2); }

    .label {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="label">Burn Away</div>

  <div class="card" id="card">
    <!-- Solution (behind) -->
    <div class="layer solution">
      <div class="badge">&#10003; Решено с МЭМ</div>
      <h3>Встроенный генератор 15 кВт</h3>
      <p>Дизельный или бензиновый генератор запускается за 30 секунд. Питает весь инструмент и сварку.</p>
      <button class="btn btn--back" id="backBtn">&#8592; Вернуться к проблеме</button>
    </div>

    <!-- Fire edge glow -->
    <div class="fire-edge"></div>

    <!-- Ember particles -->
    <div class="embers">
      <div class="ember"></div><div class="ember"></div><div class="ember"></div>
      <div class="ember"></div><div class="ember"></div><div class="ember"></div>
      <div class="ember"></div><div class="ember"></div><div class="ember"></div>
      <div class="ember"></div><div class="ember"></div><div class="ember"></div>
    </div>

    <!-- Problem (on top, burns away) -->
    <div class="layer problem">
      <div class="alert">&#9888; Проблема на объекте</div>
      <h2><em>Нет</em> электричества<br>Объект <em>парализован</em></h2>
      <p>Удалённая площадка. Ноль розеток. Сварка, болгарка, освещение — всё мертво.</p>
      <button class="btn btn--solve" id="solveBtn">Как МЭМ решает это &#8594;</button>
    </div>
  </div>

  <script>
    var card = document.getElementById('card');
    var busy = false;

    document.getElementById('solveBtn').addEventListener('click', function() {
      if (busy) return;
      busy = true;
      card.classList.remove('solved', 'restoring');
      card.classList.add('burning');

      setTimeout(function() {
        card.classList.remove('burning');
        card.classList.add('solved');
        busy = false;
      }, 1200);
    });

    document.getElementById('backBtn').addEventListener('click', function() {
      if (busy) return;
      busy = true;
      card.classList.remove('solved');
      card.classList.add('restoring');

      setTimeout(function() {
        card.classList.remove('restoring');
        busy = false;
      }, 600);
    });
  </script>
</body>
</html>
