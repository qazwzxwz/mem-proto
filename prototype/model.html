<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>МЭМ — 3D-модель</title>
  <link rel="stylesheet" href="static/css/tokens.css">
  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/components.css">
  <link rel="stylesheet" href="static/css/layout.css">
  <link rel="stylesheet" href="static/css/pages/model.css">
</head>
<body>

  <div class="model-page">

    <!-- Loading overlay -->
    <div class="model-loader" aria-live="polite">
      <div class="model-loader__spinner"></div>
      <div class="model-loader__text">Загрузка 3D-модели…</div>
    </div>

    <!-- Top bar -->
    <div class="model-topbar">
      <a href="index.html" class="model-back" aria-label="Вернуться на главную">
        <span class="model-back__arrow">←</span>
        <span>На главную</span>
      </a>
      <h1 class="model-topbar__title">3D-модель МЭМ</h1>
    </div>

    <!-- Module list (left sidebar) -->
    <nav class="model-modules" aria-label="Модули МЭМ">
      <!-- Populated by JS -->
    </nav>

    <!-- 3D Canvas -->
    <div class="model-canvas-wrap" id="model-canvas"></div>

    <!-- Info panel (right) -->
    <aside class="model-info" aria-label="Информация о модуле" role="dialog">
      <button class="model-info__close" aria-label="Закрыть">&times;</button>
      <div class="model-info__icon" aria-hidden="true"></div>
      <h2 class="model-info__title"></h2>
      <div class="model-info__body"></div>
    </aside>

    <!-- Controls hint (bottom) -->
    <div class="model-hint" aria-hidden="true">
      <span class="model-hint__icon">🖱️</span>
      <span>Вращать</span>
      <span class="model-hint__sep"></span>
      <span class="model-hint__icon">🔍</span>
      <span>Масштаб</span>
      <span class="model-hint__sep"></span>
      <span class="model-hint__icon">👆</span>
      <span>Нажми на модуль</span>
    </div>

  </div>

  <!-- ═══════════ SCRIPT ═══════════ -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    try {
      const { init } = await import('./static/js/model-viewer.js');

      const viewer = init('#model-canvas');

      if (viewer) {
        const modules = viewer.getModules();
        const nav = document.querySelector('.model-modules');

        modules.forEach(mod => {
          const btn = document.createElement('button');
          btn.className = 'model-module-btn';
          btn.dataset.module = mod.id;
          btn.innerHTML = `<span class="model-module-btn__dot"></span><span>${mod.name}</span>`;
          btn.addEventListener('click', () => viewer.selectModule(mod.id));
          nav.appendChild(btn);
        });

        document.querySelector('.model-info__close').addEventListener('click', () => {
          viewer.deselectModule();
        });

        let hintHidden = false;
        document.getElementById('model-canvas').addEventListener('pointerdown', () => {
          if (!hintHidden) {
            hintHidden = true;
            document.querySelector('.model-hint').classList.add('model-hint--hidden');
          }
        });
      }
    } catch (err) {
      console.error('3D Viewer init failed:', err);
      const loader = document.querySelector('.model-loader');
      if (loader) {
        loader.querySelector('.model-loader__spinner').style.display = 'none';
        loader.querySelector('.model-loader__text').textContent =
          'Ошибка загрузки 3D-модели. Проверьте консоль (F12).';
        loader.querySelector('.model-loader__text').style.color = '#E93C35';
      }
    }
  </script>

</body>
</html>
