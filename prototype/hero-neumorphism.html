<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Neumorphism (Dark)</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      color: #d0d0d0;
      overflow: hidden;
      height: 100vh;
    }

    .hero {
      --nm-bg: #2b3034;
      --nm-light: rgba(255, 255, 255, 0.06);
      --nm-dark: rgba(0, 0, 0, 0.35);
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--nm-bg);
      overflow: hidden;
    }

    /* ── Big outline number ── */
    .hero__num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    .hero__num span {
      font-size: 80vw;
      font-weight: 900;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 0.8px rgba(255, 255, 255, 0.03);
    }

    /* ── Neumorphic card ── */
    .hero__card {
      position: relative;
      z-index: 2;
      max-width: 680px;
      padding: 52px 48px;
      border-radius: 32px;
      background: var(--nm-bg);
      box-shadow:
        8px 8px 20px var(--nm-dark),
        -8px -8px 20px var(--nm-light);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero__title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
      color: #e8e8e8;
    }
    .hero__title em {
      font-style: normal;
      color: #E93C35;
    }

    .hero__subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: rgba(255, 255, 255, 0.45);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── Neumorphic buttons ── */
    .hero__actions {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nm-btn {
      padding: 16px 34px;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .nm-btn--primary {
      background: var(--nm-bg);
      color: #E93C35;
      box-shadow:
        5px 5px 14px var(--nm-dark),
        -5px -5px 14px var(--nm-light),
        inset 0 0 0 1px rgba(233, 60, 53, 0.1);
    }
    .nm-btn--primary:hover {
      box-shadow:
        2px 2px 6px var(--nm-dark),
        -2px -2px 6px var(--nm-light),
        inset 0 0 0 1px rgba(233, 60, 53, 0.2);
    }
    .nm-btn--primary:active {
      box-shadow:
        inset 4px 4px 10px var(--nm-dark),
        inset -4px -4px 10px var(--nm-light);
    }

    .nm-btn--secondary {
      background: var(--nm-bg);
      color: rgba(255, 255, 255, 0.65);
      box-shadow:
        5px 5px 14px var(--nm-dark),
        -5px -5px 14px var(--nm-light);
    }
    .nm-btn--secondary:hover {
      color: rgba(255, 255, 255, 0.85);
      box-shadow:
        2px 2px 6px var(--nm-dark),
        -2px -2px 6px var(--nm-light);
    }
    .nm-btn--secondary:active {
      box-shadow:
        inset 4px 4px 10px var(--nm-dark),
        inset -4px -4px 10px var(--nm-light);
    }

    /* ── Divider (neumorphic groove) ── */
    .hero__divider {
      width: 60px;
      height: 4px;
      border-radius: 2px;
      background: var(--nm-bg);
      box-shadow:
        inset 2px 2px 4px var(--nm-dark),
        inset -2px -2px 4px var(--nm-light);
      margin-bottom: 20px;
    }

    /* ── Label ── */
    .hero__label {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 20px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.5);
      background: var(--nm-bg);
      box-shadow:
        4px 4px 10px var(--nm-dark),
        -4px -4px 10px var(--nm-light);
    }

    @media (max-width: 500px) {
      .hero__card { padding: 36px 24px; margin: 0 16px; border-radius: 24px; }
      .hero__actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__num" aria-hidden="true"><span>1</span></div>

    <div class="hero__label">Neumorphism</div>

    <div class="hero__card">
      <h1 class="hero__title">
        <em>М</em>ногофункциональный<br>
        <em>Э</em>нергетический<br>
        <em>М</em>одуль
      </h1>
      <div class="hero__divider"></div>
      <p class="hero__subtitle">Создаёт комфорт в любом месте и в любое время — за счёт автономности</p>

      <div class="hero__actions">
        <a href="#" class="nm-btn nm-btn--secondary">Подробнее</a>
        <a href="#" class="nm-btn nm-btn--primary">Заказать звонок</a>
      </div>
    </div>
  </section>

</body>
</html>
