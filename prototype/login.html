<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — МЭМ</title>
  <link rel="stylesheet" href="static/css/tokens.css">
  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/components.css">
  <link rel="stylesheet" href="static/css/layout.css">
  <link rel="stylesheet" href="static/css/pages/auth.css">
</head>
<body>

  <main class="auth">
    <div class="auth__card card">
      <div class="auth__logo">
        <a href="index.html">
          
          <span>МЭМ</span>
        </a>
      </div>

      <h1 class="auth__title">Вход</h1>
      <p class="auth__subtitle">Войдите для доступа к профилю и заявкам</p>

      <form class="auth__form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" name="email" placeholder="email@example.com" required autocomplete="email">
          <div class="form-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input class="input" type="password" id="password" name="password" placeholder="Минимум 4 символа" required autocomplete="current-password">
          <div class="form-error" role="alert"></div>
        </div>

        <button type="submit" class="btn btn--primary btn--lg">Войти</button>
      </form>

      <p class="auth__alt">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { initLogin } from './static/js/auth.js';
    initLogin();
  </script>
</body>
</html>
