<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — МЭМ</title>
  <link rel="stylesheet" href="static/css/tokens.css">
  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/components.css">
  <link rel="stylesheet" href="static/css/layout.css">
  <link rel="stylesheet" href="static/css/pages/auth.css">
</head>
<body>

  <main class="auth">
    <div class="auth__card card">
      <div class="auth__logo">
        <a href="index.html">
          
          <span>МЭМ</span>
        </a>
      </div>

      <h1 class="auth__title">Регистрация</h1>
      <p class="auth__subtitle">Создайте аккаунт для работы с заявками</p>

      <form class="auth__form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" name="email" placeholder="email@example.com" required autocomplete="email">
          <div class="form-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input class="input" type="password" id="password" name="password" placeholder="Минимум 6 символов" required autocomplete="new-password">
          <div class="form-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label for="password_confirm">Повторите пароль</label>
          <input class="input" type="password" id="password_confirm" name="password_confirm" placeholder="Повторите пароль" required autocomplete="new-password">
          <div class="form-error" role="alert"></div>
        </div>

        <button type="submit" class="btn btn--primary btn--lg">Зарегистрироваться</button>
      </form>

      <p class="auth__alt">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { initRegister } from './static/js/auth.js';
    initRegister();
  </script>
</body>
</html>
