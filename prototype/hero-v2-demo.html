<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero v2 — Demo (Glassmorphism card + red tint buttons)</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Hero section ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1a1e22 0%, #2b3034 100%);
      overflow: hidden;
    }

    /* ── Big outline number ── */
    .hero__num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    .hero__num span {
      font-size: 100px;
      font-weight: 900;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 0.8px rgba(255, 255, 255, 0.04);
      transform-origin: center center;
    }

    /* ── Glassmorphism card ── */
    .hero__card {
      position: relative;
      z-index: 2;
      max-width: 740px;
      width: calc(100% - 48px);
      padding: 44px 40px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Title ── */
    .hero__title {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 12px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .hero__letter {
      color: #E93C35;
    }

    /* ── Red line (МЭМ accent) ── */
    .hero__divider {
      width: 48px;
      height: 3px;
      background: #E93C35;
      border-radius: 2px;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    /* ── Subtitle ── */
    .hero__subtitle {
      font-size: clamp(0.85rem, 1.8vw, 1rem);
      color: rgba(255, 255, 255, 0.55);
      max-width: 540px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .hero__accent {
      color: rgba(255, 255, 255, 0.85);
      font-weight: 600;
    }

    /* ── SVG product ── */
    .hero__product {
      width: 100%;
      max-width: 520px;
      margin-bottom: 28px;
      opacity: 0.92;
    }
    .hero__product svg {
      width: 100%;
      height: auto;
    }

    /* ── Buttons ── */
    .hero__actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gm-btn {
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .gm-btn:hover { transform: translateY(-2px); }
    .gm-btn:active { transform: scale(0.97); }

    /* Primary — red tint glassmorphism */
    .gm-btn--primary {
      background: rgba(233, 60, 53, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(233, 60, 53, 0.25);
      box-shadow:
        0 4px 16px rgba(233, 60, 53, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .gm-btn--primary:hover {
      background: rgba(233, 60, 53, 0.25);
      border-color: rgba(233, 60, 53, 0.35);
      box-shadow:
        0 8px 28px rgba(233, 60, 53, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* Secondary — neutral glassmorphism */
    .gm-btn--secondary {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .gm-btn--secondary:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* ── Header preview (glassmorphism, matching site) ── */
    .demo-header {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 20px rgba(43, 48, 52, 0.1),
                  inset 0 1px 0 rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 0.85rem;
    }
    .demo-header__brand {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }
    .demo-header__nav { display: flex; gap: 6px; }
    .demo-header__nav a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s;
    }
    .demo-header__nav a:hover { color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .hero__card { padding: 32px 20px 28px; }
      .hero__actions { flex-direction: column; align-items: stretch; }
      .gm-btn { justify-content: center; }
      .demo-header__nav { display: none; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__num" aria-hidden="true"><span id="bigNum">1</span></div>

    <!-- Header preview -->
    <header class="demo-header">
      <span class="demo-header__brand">МЭМ</span>
      <nav class="demo-header__nav">
        <a href="#">Главная</a>
        <a href="#">Возможности</a>
        <a href="#">Конструктор</a>
      </nav>
    </header>

    <!-- Glass card -->
    <div class="hero__card">
      <h1 class="hero__title">
        <span class="hero__letter">М</span>ногофункциональный<br>
        <span class="hero__letter">Э</span>нергетический<br>
        <span class="hero__letter">М</span>одуль
      </h1>
      <div class="hero__divider"></div>
      <p class="hero__subtitle">Создаёт <span class="hero__accent">комфорт</span> в любом месте и в любое время — за счёт <span class="hero__accent">автономности</span></p>

      <!-- SVG Product -->
      <div class="hero__product">
        <svg viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="pearl" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#F5F0EB"/>

              <stop offset="100%" stop-color="#DDD6CD"/>
            </linearGradient>
            <linearGradient id="pearl-top" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FDFBF9"/>
              <stop offset="100%" stop-color="#F0EAE3"/>
            </linearGradient>
            <filter id="shadow-body" x="-4%" y="-4%" width="108%" height="116%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2B3034" flood-opacity="0.18"/>
            </filter>
            <mask id="body-mask">
              <rect x="50" y="60" width="540" height="180" fill="white"/>
            </mask>
          </defs>
          <g mask="url(#body-mask)" filter="url(#shadow-body)">
            <rect x="50" y="60" width="540" height="180" rx="6" fill="url(#pearl)" stroke="#B8AFA5" stroke-width="1.5"/>
          </g>
          <rect x="50" y="60" width="540" height="24" rx="6" fill="url(#pearl-top)" stroke="#B8AFA5" stroke-width="1.5"/>
          <line x1="50" y1="84" x2="590" y2="84" stroke="#C8C0B6" stroke-width="0.8"/>
          <rect x="50" y="232" width="540" height="8" rx="2" fill="#C4BAB0" stroke="#B0A89E" stroke-width="0.5"/>
          <rect x="50" y="94" width="540" height="22" fill="#D72638"/>
          <text x="80" y="111" text-anchor="start" font-family="'Arial Black', Arial, sans-serif" font-size="15" font-weight="900" fill="#FFFFFF" letter-spacing="3">М Э М</text>
          <rect x="240" y="126" width="100" height="100" rx="3" fill="#E2DCD5" stroke="#A89E94" stroke-width="1.2"/>
          <rect x="246" y="132" width="88" height="88" rx="2" fill="none" stroke="#B8AFA5" stroke-width="0.8"/>
          <rect x="278" y="168" width="24" height="6" rx="2" fill="#A89E94" stroke="#8E857C" stroke-width="0.6"/>
          <rect x="278" y="182" width="24" height="6" rx="2" fill="#A89E94" stroke="#8E857C" stroke-width="0.6"/>
          <circle cx="266" cy="176" r="3" fill="#8E857C"/>
          <rect x="68" y="126" width="80" height="68" rx="3" fill="#E8E2DA" stroke="#A89E94" stroke-width="1"/>
          <rect x="74" y="132" width="68" height="56" rx="2" fill="none" stroke="#C4BAB0" stroke-width="0.6"/>
          <rect x="160" y="126" width="60" height="68" rx="3" fill="#E8E2DA" stroke="#A89E94" stroke-width="1"/>
          <rect x="166" y="132" width="48" height="56" rx="2" fill="none" stroke="#C4BAB0" stroke-width="0.6"/>
          <rect x="356" y="135" width="30" height="4" rx="2" fill="#C4BAB0"/>
          <rect x="356" y="145" width="30" height="4" rx="2" fill="#C4BAB0"/>
          <rect x="356" y="155" width="30" height="4" rx="2" fill="#C4BAB0"/>
          <rect x="356" y="165" width="30" height="4" rx="2" fill="#C4BAB0"/>
          <rect x="400" y="126" width="70" height="65" rx="3" fill="#C0392B" stroke="#962D22" stroke-width="1.2"/>
          <rect x="405" y="131" width="60" height="55" rx="2" fill="#A93226"/>
          <circle cx="429" cy="160" r="20" fill="none" stroke="#F0EDE8" stroke-width="2.4"/>
          <circle cx="429" cy="160" r="17" fill="none" stroke="#E6E2DC" stroke-width="2.3"/>
          <circle cx="429" cy="160" r="14" fill="none" stroke="#F0EDE8" stroke-width="2.2"/>
          <circle cx="429" cy="160" r="11" fill="none" stroke="#E6E2DC" stroke-width="2.1"/>
          <circle cx="429" cy="160" r="8" fill="none" stroke="#F0EDE8" stroke-width="2"/>
          <circle cx="429" cy="160" r="5" fill="none" stroke="#E6E2DC" stroke-width="1.8"/>
          <circle cx="429" cy="160" r="4" fill="#C0B8AE" stroke="#8E857C" stroke-width="0.8"/>
          <circle cx="429" cy="160" r="2" fill="#A89E94"/>
          <rect x="400" y="126" width="70" height="65" rx="3" fill="rgba(200,220,235,0.22)" stroke="#8E857C" stroke-width="0.8"/>
          <path d="M408,129 L418,129 L408,151 Z" fill="rgba(255,255,255,0.4)"/>
          <path d="M422,129 L440,129 L408,176 L408,156 Z" fill="rgba(255,255,255,0.18)"/>
          <rect x="400" y="126" width="70" height="65" rx="3" fill="none" stroke="#7A7268" stroke-width="1.4"/>
          <rect x="428" y="189" width="14" height="5" rx="1.5" fill="#8E857C" stroke="#6E6660" stroke-width="0.6"/>
          <circle cx="435" cy="191.5" r="1.5" fill="#6E6660"/>
          <circle cx="60" cy="98" r="2.5" fill="#B0A89E"/>
          <circle cx="580" cy="98" r="2.5" fill="#B0A89E"/>
          <circle cx="60" cy="230" r="2" fill="#B8AFA5"/>
          <circle cx="580" cy="230" r="2" fill="#B8AFA5"/>
          <circle cx="320" cy="230" r="2" fill="#B8AFA5"/>
        </svg>
      </div>

      <div class="hero__actions">
        <a href="#" class="gm-btn gm-btn--secondary">Подробнее</a>
        <a href="#" class="gm-btn gm-btn--primary">Заказать звонок</a>
      </div>
    </div>
  </section>

  <script>
    /* Scale "1" to full viewport height */
    function scaleBigNum() {
      var el = document.getElementById('bigNum');
      el.style.transform = 'none';
      var h = el.getBoundingClientRect().height;
      var scale = window.innerHeight / h;
      el.style.transform = 'scale(' + scale + ')';
    }
    window.addEventListener('resize', scaleBigNum);
    requestAnimationFrame(scaleBigNum);
  </script>
</body>
</html>
