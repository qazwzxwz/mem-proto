<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — МЭМ</title>
  <link rel="stylesheet" href="static/css/tokens.css">
  <link rel="stylesheet" href="static/css/base.css">
  <link rel="stylesheet" href="static/css/components.css">
  <link rel="stylesheet" href="static/css/layout.css">
  <link rel="stylesheet" href="static/css/pages/admin.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header" role="banner">
    <div class="header__inner">
      <a href="index.html" class="header__logo" aria-label="МЭМ — на главную">
        
        <span>МЭМ</span>
      </a>
      <nav class="header__nav" aria-label="Основная навигация">
        <a href="index.html">Главная</a>
        
        <a href="profile.html">Профиль</a>
        <a href="admin.html" class="active">Админ</a>
        <div class="nav-auth-group">
          <a href="#" class="btn btn--ghost btn--sm" data-action="logout">Выйти</a>
        </div>
      </nav>
      <div class="header__actions">
        
        <a href="#" class="btn btn--ghost btn--sm header__auth-btn" data-action="logout">Выйти</a>
      </div>
      <button class="burger" aria-label="Открыть меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="page">
    <div class="page__content" style="max-width:1000px">
      <h1 class="page__title">Админ-панель</h1>

      <!-- Stats -->
      <div class="admin-stats">
        <div class="stat-card card">
          <div class="stat-card__value" id="stat-total">0</div>
          <div class="stat-card__label">Всего заявок</div>
        </div>
        <div class="stat-card card">
          <div class="stat-card__value" id="stat-new">0</div>
          <div class="stat-card__label">Новых</div>
        </div>
        <div class="stat-card card">
          <div class="stat-card__value" id="stat-revenue">0 ₽</div>
          <div class="stat-card__label">Сумма заявок</div>
        </div>
      </div>

      <!-- Orders table -->
      <div class="card">
        <h3 style="margin-bottom:var(--sp-4)">Заявки</h3>
        <div class="admin-table-wrap">
          <table class="admin-table" aria-label="Таблица заявок">
            <thead>
              <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Модель</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Order detail modal -->
  <div class="order-modal-overlay" id="orderModal" aria-hidden="true">
    <div class="order-modal" role="dialog" aria-labelledby="orderModalTitle">
      <div class="order-modal__header">
        <div>
          <h2 class="order-modal__title" id="orderModalTitle"></h2>
          <span class="order-modal__date" id="orderModalDate"></span>
        </div>
        <button class="order-modal__close" id="orderModalClose" aria-label="Закрыть">&times;</button>
      </div>

      <div class="order-modal__badge" id="orderModalStatus"></div>

      <div class="order-modal__body" id="orderModalBody"></div>

      <div class="order-modal__footer">
        <select class="status-select status-select--lg" id="orderModalStatusSelect" aria-label="Изменить статус"></select>
        <button class="btn btn--primary" id="orderModalSaveStatus">Сохранить статус</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initHeader } from './static/js/app.js';
    import { init as initAdmin } from './static/js/admin.js';
    initHeader();
    initAdmin();
  </script>
</body>
</html>
