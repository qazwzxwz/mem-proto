<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анимация — Glitch Transition</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: #1a1d20;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      width: 480px;
      max-width: calc(100% - 32px);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .layer {
      padding: 48px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.15s;
    }

    .problem {
      background: linear-gradient(135deg, #1a1d20, #2a1012);
      position: relative;
      z-index: 2;
    }
    .solution {
      background: linear-gradient(160deg, #f0f4f2 0%, #e8efe9 40%, #f5f8f5 100%);
      color: #1a1d20;
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      opacity: 0;
    }

    /* Glitch active state */
    .card.glitching {
      animation: glitchShake 0.5s steps(8) forwards;
    }
    .card.glitching .problem {
      animation: glitchSlice 0.5s steps(4) forwards;
    }
    .card.glitching::before,
    .card.glitching::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .card.glitching::before {
      background: rgba(233, 60, 53, 0.15);
      animation: glitchRGB1 0.5s steps(6) forwards;
    }
    .card.glitching::after {
      background: rgba(60, 140, 255, 0.12);
      animation: glitchRGB2 0.5s steps(6) forwards;
    }

    /* Solved: problem hidden, solution visible */
    .card.solved .problem { opacity: 0; pointer-events: none; }
    .card.solved .solution { opacity: 1; z-index: 2; }

    /* Reverse glitch */
    .card.glitching-back {
      animation: glitchShake 0.4s steps(8) forwards;
    }
    .card.glitching-back::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
      background: rgba(46, 125, 50, 0.12);
      mix-blend-mode: screen;
      animation: glitchRGB1 0.4s steps(6) forwards;
    }

    @keyframes glitchShake {
      0%   { transform: translate(0); }
      12%  { transform: translate(-4px, 2px); }
      25%  { transform: translate(3px, -3px); }
      37%  { transform: translate(-2px, 1px); }
      50%  { transform: translate(4px, -1px); }
      62%  { transform: translate(-3px, 3px); }
      75%  { transform: translate(2px, -2px); }
      87%  { transform: translate(-1px, 1px); }
      100% { transform: translate(0); }
    }

    @keyframes glitchSlice {
      0%   { clip-path: inset(0 0 0 0); }
      25%  { clip-path: inset(20% 0 30% 0); }
      50%  { clip-path: inset(60% 0 10% 0); }
      75%  { clip-path: inset(5% 0 70% 0); }
      100% { clip-path: inset(0 0 100% 0); }
    }

    @keyframes glitchRGB1 {
      0%   { transform: translate(0); opacity: 0.8; }
      33%  { transform: translate(6px, -2px); opacity: 0.6; }
      66%  { transform: translate(-4px, 3px); opacity: 0.3; }
      100% { transform: translate(0); opacity: 0; }
    }

    @keyframes glitchRGB2 {
      0%   { transform: translate(0); opacity: 0.6; }
      33%  { transform: translate(-5px, 3px); opacity: 0.5; }
      66%  { transform: translate(3px, -2px); opacity: 0.2; }
      100% { transform: translate(0); opacity: 0; }
    }

    /* Scanline overlay */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    .alert {
      font-size: 0.8rem; font-weight: 600; color: #E93C35;
      text-transform: uppercase; letter-spacing: 0.15em;
    }
    h2 { font-size: 1.5rem; line-height: 1.3; }
    h2 em { font-style: normal; color: #E93C35; }
    p { font-size: 0.88rem; color: rgba(255,255,255,0.6); line-height: 1.6; }
    .solution p { color: rgba(26,29,32,0.6); }
    .badge { font-size: 0.8rem; font-weight: 600; color: #2E7D32; }
    .solution h3 { font-size: 1.4rem; color: #1a1d20; }

    .btn {
      align-self: flex-start; padding: 12px 24px; border: none;
      border-radius: 12px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn--solve { background: rgba(233,60,53,0.15); color: #fff; border: 1px solid rgba(233,60,53,0.3); }
    .btn--back { background: rgba(46,125,50,0.1); color: #2E7D32; border: 1px solid rgba(46,125,50,0.2); }

    .label {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="label">Glitch Transition</div>

  <div class="card" id="card">
    <div class="layer solution">
      <div class="badge">&#10003; Решено с МЭМ</div>
      <h3>Встроенный генератор 15 кВт</h3>
      <p>Дизельный или бензиновый генератор запускается за 30 секунд. Питает весь инструмент и сварку.</p>
      <button class="btn btn--back" id="backBtn">&#8592; Вернуться к проблеме</button>
    </div>
    <div class="layer problem" id="problem">
      <div class="alert">&#9888; Проблема на объекте</div>
      <h2><em>Нет</em> электричества<br>Объект <em>парализован</em></h2>
      <p>Удалённая площадка. Ноль розеток. Сварка, болгарка, освещение — всё мертво.</p>
      <button class="btn btn--solve" id="solveBtn">Как МЭМ решает это &#8594;</button>
    </div>
  </div>

  <script>
    var card = document.getElementById('card');
    var busy = false;

    document.getElementById('solveBtn').addEventListener('click', function() {
      if (busy) return;
      busy = true;
      card.classList.add('glitching');
      setTimeout(function() {
        card.classList.remove('glitching');
        card.classList.add('solved');
        busy = false;
      }, 500);
    });

    document.getElementById('backBtn').addEventListener('click', function() {
      if (busy) return;
      busy = true;
      card.classList.add('glitching-back');
      setTimeout(function() {
        card.classList.remove('glitching-back', 'solved');
        busy = false;
      }, 400);
    });
  </script>
</body>
</html>
