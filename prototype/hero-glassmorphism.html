<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero — Glassmorphism</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Background ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1e22 0%, #2b3034 40%, #1a1e22 100%);
      overflow: hidden;
    }

    /* Colored shapes behind the glass */
    .hero__shape {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .hero__shape--1 {
      width: 350px; height: 350px;
      top: 10%; left: 15%;
      background: #E93C35;
      opacity: 0.35;
      filter: blur(60px);
      animation: floatShape 8s ease-in-out infinite alternate;
    }
    .hero__shape--2 {
      width: 280px; height: 280px;
      bottom: 15%; right: 12%;
      background: #2E7D32;
      opacity: 0.3;
      filter: blur(50px);
      animation: floatShape 10s ease-in-out infinite alternate-reverse;
    }
    .hero__shape--3 {
      width: 200px; height: 200px;
      top: 40%; right: 30%;
      background: #1565C0;
      opacity: 0.25;
      filter: blur(40px);
      animation: floatShape 12s ease-in-out infinite alternate;
    }
    @keyframes floatShape {
      to { transform: translate(40px, -30px) scale(1.1); }
    }

    /* ── Big outline number ── */
    .hero__num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    .hero__num span {
      font-size: 80vw;
      font-weight: 900;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 0.8px rgba(255, 255, 255, 0.04);
    }

    /* ── Glassmorphism card ── */
    .hero__card {
      position: relative;
      z-index: 2;
      max-width: 680px;
      padding: 48px 44px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero__title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .hero__title em {
      font-style: normal;
      color: #E93C35;
    }

    .hero__subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: rgba(255, 255, 255, 0.6);
      max-width: 520px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* ── Glassmorphism buttons ── */
    .hero__actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gm-btn {
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    .gm-btn:hover { transform: translateY(-2px); }
    .gm-btn:active { transform: scale(0.97); }

    .gm-btn--primary {
      background: rgba(233, 60, 53, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: rgba(233, 60, 53, 0.25);
      box-shadow:
        0 4px 16px rgba(233, 60, 53, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .gm-btn--primary:hover {
      background: rgba(233, 60, 53, 0.3);
      box-shadow: 0 8px 28px rgba(233, 60, 53, 0.25);
    }

    .gm-btn--secondary {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .gm-btn--secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.2);
    }

    /* ── Label ── */
    .hero__label {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 500px) {
      .hero__card { padding: 32px 24px; margin: 0 16px; }
      .hero__actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__shape hero__shape--1"></div>
    <div class="hero__shape hero__shape--2"></div>
    <div class="hero__shape hero__shape--3"></div>

    <div class="hero__num" aria-hidden="true"><span>1</span></div>

    <div class="hero__label">Glassmorphism</div>

    <div class="hero__card">
      <h1 class="hero__title">
        <em>М</em>ногофункциональный<br>
        <em>Э</em>нергетический<br>
        <em>М</em>одуль
      </h1>
      <p class="hero__subtitle">Создаёт комфорт в любом месте и в любое время — за счёт автономности</p>

      <div class="hero__actions">
        <a href="#" class="gm-btn gm-btn--secondary">Подробнее</a>
        <a href="#" class="gm-btn gm-btn--primary">Заказать звонок</a>
      </div>
    </div>
  </section>

</body>
</html>
